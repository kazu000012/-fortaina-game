<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>3D Steve - Infinite Ground Integration</title>
    <style>
        body {
            margin: 0;
            background: #aee2ff;
            overflow: hidden;
            font-family: sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="overlay">クリックして開始<br>Space: ジャンプ / 視点はそのままに地面を無限化</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, keys = {},
            isLocked = false;

        const resize = () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        };
        window.onresize = resize;
        resize();

        const player = {
            x: 0,
            y: 0,
            z: 0,
            rx: 0.2,
            ry: 0,
            walk: 0,
            vy: 0,
            onGround: true,
            dist: 7.0 // 初期カメラ距離
        };

        // 地面の波打ち
        const getTerrainY = (x, z) => Math.sin(x * 0.3) * 0.5 + Math.cos(z * 0.3) * 0.5;

        document.getElementById('overlay').onclick = () => canvas.requestPointerLock();
        document.addEventListener('pointerlockchange', () => {
            isLocked = (document.pointerLockElement === canvas);
            document.getElementById('overlay').style.display = isLocked ? 'none' : 'flex';
        });

        // マウスホイールで視点距離を調整
        window.addEventListener('wheel', e => {
            if (isLocked) {
                player.dist = Math.max(3, Math.min(30, player.dist + e.deltaY * 0.01));
            }
        });

        document.addEventListener('mousemove', e => {
            if (isLocked) {
                player.ry += e.movementX * 0.005;
                player.rx = Math.max(-1.2, Math.min(1.2, player.rx + e.movementY * 0.005));
            }
        });

        window.onkeydown = e => {
            keys[e.code] = true;
            if (e.code === 'Space' && player.onGround) {
                player.vy = 0.22;
                player.onGround = false;
            }
        };
        window.onkeyup = e => keys[e.code] = false;

        function project(x, y, z) {
            const headY = player.y - 2.2;
            const offsetSide = 1.2;
            const ox = Math.cos(player.ry) * offsetSide;
            const oz = -Math.sin(player.ry) * offsetSide;

            const camX = player.x - Math.sin(player.ry) * player.dist * Math.cos(player.rx) + ox;
            const camZ = player.z - Math.cos(player.ry) * player.dist * Math.cos(player.rx) + oz;
            const camY = headY - Math.sin(player.rx) * player.dist;

            let dx = x - camX,
                dy = y - camY,
                dz = z - camZ;
            let rz = dz * Math.cos(-player.ry) - dx * Math.sin(-player.ry);
            let rx_p = dz * Math.sin(-player.ry) + dx * Math.cos(-player.ry);
            let finalY = dy * Math.cos(player.rx) - rz * Math.sin(player.rx);
            let finalZ = dy * Math.sin(player.rx) + rz * Math.cos(player.rx);

            if (finalZ <= 0.1) return null;
            const f = (w / 0.8) / finalZ;
            return {
                x: w / 2 + rx_p * f,
                y: h / 2 + finalY * f,
                z: finalZ
            };
        }

        function getBoxData(px, py, pz, bw, bh, bd, color, ry, rx = 0, isHead = false, offX = 0) {
            const cY = Math.cos(ry),
                sY = Math.sin(ry),
                cX = Math.cos(rx),
                sX = Math.sin(rx);
            const getPt = (lx, ly, lz) => {
                let ty = ly,
                    tz = lz;
                if (isHead) {
                    let ry_tmp = ly * cX - lz * sX;
                    let rz_tmp = ly * sX + lz * cX;
                    ty = ry_tmp;
                    tz = rz_tmp;
                } else {
                    ty = ly * cX - lz * sX;
                    tz = ly * sX + lz * cX;
                }
                return project(px + ((lx + offX) * cY + tz * sY), py + ty, pz + (-(lx + offX) * sY + tz * cY));
            };
            const w2 = bw / 2,
                h2 = bh,
                d2 = bd / 2;
            const pts = [getPt(-w2, 0, -d2), getPt(w2, 0, -d2), getPt(w2, h2, -d2), getPt(-w2, h2, -d2), getPt(-w2, 0, d2), getPt(w2, 0, d2), getPt(w2, h2, d2), getPt(-w2, h2, d2)];
            if (pts.some(v => v === null)) return [];

            const faces = [{
                p: [4, 5, 6, 7],
                f: true,
                id: 'front'
            }, {
                p: [0, 1, 2, 3],
                f: false,
                id: 'back'
            }, {
                p: [0, 4, 7, 3],
                f: false,
                id: 'left'
            }, {
                p: [1, 5, 6, 2],
                f: false,
                id: 'right'
            }, {
                p: [3, 2, 6, 7],
                f: false,
                id: 'top'
            }, {
                p: [0, 1, 5, 4],
                f: false,
                id: 'bottom'
            }];
            return faces.map(face => {
                const p1 = pts[face.p[0]],
                    p2 = pts[face.p[1]],
                    p3 = pts[face.p[2]];
                const isVisible = (p2.x - p1.x) * (p3.y - p1.y) - (p2.y - p1.y) * (p3.x - p1.x) > 0;
                const zSum = face.p.reduce((sum, idx) => sum + pts[idx].z, 0) / 4;
                return {
                    z: zSum,
                    draw: () => {
                        ctx.fillStyle = (isHead && face.id !== 'front' && face.id !== 'bottom') ? "#382215" : color;
                        ctx.beginPath();
                        face.p.forEach((idx, j) => j === 0 ? ctx.moveTo(pts[idx].x, pts[idx].y) : ctx.lineTo(pts[idx].x, pts[idx].y));
                        ctx.fill();
                        if (isHead && isVisible && face.id === 'front') {
                            const dr = (ex, ey, ew, eh, c) => {
                                ctx.fillStyle = c;
                                const p1b = getPt(ex, ey, d2 + 0.01),
                                    p2b = getPt(ex + ew, ey, d2 + 0.01),
                                    p3b = getPt(ex + ew, ey + eh, d2 + 0.01),
                                    p4b = getPt(ex, ey + eh, d2 + 0.01);
                                if (p1b && p2b && p3b && p4b) {
                                    ctx.beginPath();
                                    ctx.moveTo(p1b.x, p1b.y);
                                    ctx.lineTo(p2b.x, p2b.y);
                                    ctx.lineTo(p3b.x, p3b.y);
                                    ctx.lineTo(p4b.x, p4b.y);
                                    ctx.fill();
                                }
                            };
                            dr(-0.2, 0.15, 0.08, 0.06, "#fff");
                            dr(-0.12, 0.15, 0.08, 0.06, "#4646B5");
                            dr(0.04, 0.15, 0.08, 0.06, "#fff");
                            dr(0.12, 0.15, 0.08, 0.06, "#4646B5");
                            dr(-0.06, 0.25, 0.12, 0.08, "#C68966");
                            dr(-0.14, 0.35, 0.28, 0.06, "#382215");
                            dr(-w2, 0, bw, 0.12, "#382215");
                        }
                    }
                };
            });
        }

        function loop() {
            if (isLocked) {
                const ty = getTerrainY(player.x, player.z);
                if (!player.onGround) {
                    player.y -= player.vy;
                    player.vy -= 0.01;
                    if (player.y >= ty) {
                        player.y = ty;
                        player.onGround = true;
                        player.vy = 0;
                    }
                } else {
                    player.y = ty;
                }

                let mx = 0,
                    mz = 0;
                if (keys['KeyW']) mz += 1;
                if (keys['KeyS']) mz -= 1;
                if (keys['KeyA']) mx -= 1;
                if (keys['KeyD']) mx += 1;
                let mag = Math.sqrt(mx * mx + mz * mz);
                if (mag > 0) {
                    mx /= mag;
                    mz /= mag;
                    const speed = keys['ShiftLeft'] ? 0.25 : 0.12;
                    player.x += (Math.sin(player.ry) * mz + Math.cos(player.ry) * mx) * speed;
                    player.z += (Math.cos(player.ry) * mz - Math.sin(player.ry) * mx) * speed;
                    player.walk += (speed > 0.2 ? 0.35 : 0.2);
                } else player.walk = 0;
            }

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = "#aee2ff";
            ctx.fillRect(0, 0, w, h);

            let renderList = [];

            // 無限波打ち地面
            const gStep = 4,
                gRange = Math.max(8, Math.floor(player.dist / 1.5));
            const bX = Math.floor(player.x / gStep) * gStep,
                bZ = Math.floor(player.z / gStep) * gStep;
            for (let i = -gRange; i <= gRange; i++) {
                for (let j = -gRange; j <= gRange; j++) {
                    const gx = bX + i * gStep,
                        gz = bZ + j * gStep;
                    const p1 = project(gx, getTerrainY(gx, gz), gz),
                        p2 = project(gx + gStep, getTerrainY(gx + gStep, gz), gz);
                    const p3 = project(gx + gStep, getTerrainY(gx + gStep, gz + gStep), gz + gStep),
                        p4 = project(gx, getTerrainY(gx, gz + gStep), gz + gStep);
                    if (p1 && p2 && p3 && p4) {
                        const d = Math.sqrt((gx - player.x) ** 2 + (gz - player.z) ** 2),
                            op = Math.max(0, 1 - d / (gStep * gRange));
                        renderList.push({
                            z: Math.max(p1.z, p2.z, p3.z, p4.z),
                            draw: () => {
                                ctx.fillStyle = `rgba(43, 88, 12, ${op})`;
                                ctx.strokeStyle = `rgba(116, 184, 22, ${op * 0.3})`;
                                ctx.beginPath();
                                ctx.moveTo(p1.x, p1.y);
                                ctx.lineTo(p2.x, p2.y);
                                ctx.lineTo(p3.x, p3.y);
                                ctx.lineTo(p4.x, p4.y);
                                ctx.fill();
                                ctx.stroke();
                            }
                        });
                    }
                }
            }

            const sw = Math.sin(player.walk) * 0.5;
            // m1 (Steve) 描画
            renderList.push(...getBoxData(player.x, player.y - 1.8, player.z, 0.6, 0.9, 0.3, "#1FB0B0", player.ry));
            renderList.push(...getBoxData(player.x, player.y - 1.85, player.z, 0.5, -0.5, 0.5, "#E3A383", player.ry, -player.rx, true));
            renderList.push(...getBoxData(player.x, player.y - 0.9, player.z, 0.28, 0.9, 0.28, "#3D3D99", player.ry, sw, false, -0.16));
            renderList.push(...getBoxData(player.x, player.y - 0.9, player.z, 0.28, 0.9, 0.28, "#3D3D99", player.ry, -sw, false, 0.16));
            renderList.push(...getBoxData(player.x, player.y - 1.8, player.z, 0.25, 0.9, 0.25, "#E3A383", player.ry, sw, false, -0.45));
            renderList.push(...getBoxData(player.x, player.y - 1.8, player.z, 0.25, 0.9, 0.25, "#E3A383", player.ry, -sw, false, 0.45));

            renderList.filter(o => o && o.draw).sort((a, b) => b.z - a.z).forEach(f => f.draw());
            requestAnimationFrame(loop);
        }
        loop();
    </script>

</body>

</html>
