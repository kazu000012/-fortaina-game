<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>3D Steve Inverted Controls</title>
    <style>
        body {
            margin: 0;
            background: #87ceeb;
            overflow: hidden;
            font-family: sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="overlay">クリックして開始<br>W,S: 前後 / A: 右へ / D: 左へ</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, keys = {},
            isLocked = false;

        const resize = () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        };
        window.onresize = resize;
        resize();

        const player = {
            x: 0,
            y: 0,
            z: 0,
            rx: 0.3,
            ry: 0,
            walk: 0,
            vy: 0,
            onGround: true
        };

        document.getElementById('overlay').onclick = () => canvas.requestPointerLock();
        document.addEventListener('pointerlockchange', () => {
            isLocked = (document.pointerLockElement === canvas);
            document.getElementById('overlay').style.display = isLocked ? 'none' : 'flex';
        });

        document.addEventListener('mousemove', e => {
            if (isLocked) {
                player.ry += e.movementX * 0.005;
                player.rx = Math.max(-1.4, Math.min(1.4, player.rx + e.movementY * 0.005));
            }
        });

        window.onkeydown = e => {
            keys[e.code] = true;
            if (e.code === 'Space' && player.onGround) {
                player.vy = 0.2;
                player.onGround = false;
            }
        };
        window.onkeyup = e => keys[e.code] = false;

        function project(x, y, z) {
            const headY = player.y - 2.2;
            const dist = 6.0;
            const camX = player.x - Math.sin(player.ry) * dist * Math.cos(player.rx);
            const camZ = player.z - Math.cos(player.ry) * dist * Math.cos(player.rx);
            const camY = headY - Math.sin(player.rx) * dist;

            let dx = x - camX,
                dy = y - camY,
                dz = z - camZ;
            let rz = dz * Math.cos(-player.ry) - dx * Math.sin(-player.ry);
            let rx = dz * Math.sin(-player.ry) + dx * Math.cos(-player.ry);
            let finalY = dy * Math.cos(player.rx) - rz * Math.sin(player.rx);
            let finalZ = dy * Math.sin(player.rx) + rz * Math.cos(player.rx);

            if (finalZ <= 0.1) return null;
            const f = (w / 1.1) / finalZ;
            return {
                x: w / 2 + rx * f,
                y: h / 2 + finalY * f
            };
        }

        function drawBox(px, py, pz, bw, bh, bd, color, ry, rx = 0, isHead = false) {
            const cY = Math.cos(ry),
                sY = Math.sin(ry),
                cX = Math.cos(rx),
                sX = Math.sin(rx);
            const getPt = (lx, ly, lz) => {
                let ty = ly * cX - lz * sX,
                    tz = ly * sX + lz * cX;
                return project(px + (lx * cY + tz * sY), py + ty, pz + (-lx * sY + tz * cY));
            };
            const w2 = bw / 2,
                h2 = bh,
                d2 = bd / 2;
            const pts = [
                getPt(-w2, 0, -d2), getPt(w2, 0, -d2), getPt(w2, h2, -d2), getPt(-w2, h2, -d2),
                getPt(-w2, 0, d2), getPt(w2, 0, d2), getPt(w2, h2, d2), getPt(-w2, h2, d2)
            ];
            if (pts.some(v => v === null)) return;

            const faces = [{
                p: [0, 1, 2, 3],
                f: true
            }, {
                p: [4, 5, 6, 7],
                f: false
            }, {
                p: [0, 3, 7, 4],
                f: false
            }, {
                p: [1, 2, 6, 5],
                f: false
            }, {
                p: [3, 2, 6, 7],
                f: false
            }, {
                p: [0, 1, 5, 4],
                f: false
            }];

            faces.forEach(face => {
                ctx.fillStyle = color;
                ctx.globalAlpha = 1.0;
                ctx.beginPath();
                face.p.forEach((idx, i) => i === 0 ? ctx.moveTo(pts[idx].x, pts[idx].y) : ctx.lineTo(pts[idx].x, pts[idx].y));
                ctx.fill();

                if (face.f && isHead) {
                    const dr = (ex, ey, ew, eh, c) => {
                        ctx.fillStyle = c;
                        const p1 = getPt(ex, ey, -d2 - 0.01),
                            p2 = getPt(ex + ew, ey, -d2 - 0.01),
                            p3 = getPt(ex + ew, ey + eh, -d2 - 0.01),
                            p4 = getPt(ex, ey + eh, -d2 - 0.01);
                        if (p1 && p2 && p3 && p4) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.lineTo(p3.x, p3.y);
                            ctx.lineTo(p4.x, p4.y);
                            ctx.fill();
                        }
                    };
                    dr(-0.2, 0.18, 0.08, 0.06, "#fff");
                    dr(-0.12, 0.18, 0.08, 0.06, "#4646B5");
                    dr(0.04, 0.18, 0.08, 0.06, "#fff");
                    dr(0.12, 0.18, 0.08, 0.06, "#4646B5");
                    dr(-0.06, 0.26, 0.12, 0.08, "#C68966");
                    dr(-0.14, 0.36, 0.28, 0.06, "#382215");
                }
            });
        }

        function loop() {
            if (isLocked) {
                if (!player.onGround) {
                    player.y -= player.vy;
                    player.vy -= 0.01;
                    if (player.y >= 0) {
                        player.y = 0;
                        player.onGround = true;
                    }
                }
                const s = 0.12;
                if (keys['KeyW']) {
                    player.x += Math.sin(player.ry) * s;
                    player.z += Math.cos(player.ry) * s;
                    player.walk += 0.2;
                }
                if (keys['KeyS']) {
                    player.x -= Math.sin(player.ry) * s;
                    player.z -= Math.cos(player.ry) * s;
                    player.walk += 0.2;
                }
                // あえて左右を逆に設定
                if (keys['KeyA']) {
                    player.x -= Math.cos(player.ry) * s;
                    player.z += Math.sin(player.ry) * s;
                    player.walk += 0.2;
                } // Aで右
                if (keys['KeyD']) {
                    player.x += Math.cos(player.ry) * s;
                    player.z -= Math.sin(player.ry) * s;
                    player.walk += 0.2;
                } // Dで左
                if (!keys['KeyW'] && !keys['KeyS'] && !keys['KeyA'] && !keys['KeyD']) player.walk = 0;
            }

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = "#87ceeb";
            ctx.fillRect(0, 0, w, h);
            for (let i = -6; i <= 6; i++)
                for (let j = -6; j <= 6; j++) drawBox(i, 0.5, j, 0.98, 0.5, 0.98, (i + j) % 2 === 0 ? "#5da536" : "#4e8a2d", 0);

            const {
                x,
                y,
                z,
                ry,
                rx,
                walk
            } = player;
            const sw = Math.sin(walk) * 0.5;
            drawBox(x, y - 1.8, z, 0.6, 0.9, 0.3, "#1FB0B0", ry);
            drawBox(x, y - 2.35, z, 0.5, 0.5, 0.5, "#E3A383", ry, rx, true);

            const os = (ox, oz) => ({
                x: ox * Math.cos(ry) + oz * Math.sin(ry),
                z: -ox * Math.sin(ry) + oz * Math.cos(ry)
            });
            const l = os(-0.16, 0),
                r = os(0.16, 0),
                la = os(-0.45, 0),
                ra = os(0.45, 0);
            drawBox(x + l.x, y - 0.9, z + l.z, 0.28, 0.9, 0.28, "#3D3D99", ry, sw);
            drawBox(x + r.x, y - 0.9, z + r.z, 0.28, 0.9, 0.28, "#3D3D99", ry, -sw);
            drawBox(x + la.x, y - 1.8, z + la.z, 0.25, 0.9, 0.25, "#E3A383", ry, sw);
            drawBox(x + ra.x, y - 1.8, z + ra.z, 0.25, 0.9, 0.25, "#E3A383", ry, -sw);
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>

</html>
