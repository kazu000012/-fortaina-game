<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>3D Voxel Steve Fixed</title>
    <style>
        body {
            margin: 0;
            background: #87ceeb;
            overflow: hidden;
            font-family: sans-serif;
        }
        
        canvas {
            display: block;
            background: #87ceeb;
        }
        
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <h1>CLICK TO START</h1>
        <p>WASDで移動 / Spaceでジャンプ</p>
    </div>
    <div id="ui">マウスで視点操作 / 離しても再クリックで復帰</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, keys = {},
            isLocked = false;

        const resize = () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        };
        window.onresize = resize;
        resize();

        // プレイヤー (3D座標)
        const player = {
            x: 10,
            y: 0,
            z: 10,
            rx: 0,
            ry: 0,
            walk: 0,
            vy: 0,
            onGround: true
        };

        // --- 確実に開始する仕組み ---
        const overlay = document.getElementById('overlay');
        overlay.addEventListener('click', () => {
            canvas.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = (document.pointerLockElement === canvas);
            overlay.style.display = isLocked ? 'none' : 'flex';
        });

        document.addEventListener('mousemove', (e) => {
            if (isLocked) {
                player.ry += e.movementX * 0.003;
                player.rx = Math.max(-0.6, Math.min(0.6, player.rx - e.movementY * 0.003));
            }
        });

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
        });
        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        // --- 3Dプロジェクション ---
        function project(x, y, z) {
            const camDist = 6;
            // カメラをプレイヤーの背後に配置
            const camX = player.x - Math.sin(player.ry) * camDist;
            const camZ = player.z - Math.cos(player.ry) * camDist;
            const camY = player.y - 4 - player.rx * 5;

            let dx = x - camX,
                dy = y - camY,
                dz = z - camZ;
            let rz = dz * Math.cos(-player.ry) - dx * Math.sin(-player.ry);
            let rx = dz * Math.sin(-player.ry) + dx * Math.cos(-player.ry);

            if (rz <= 0.5) return null;
            const f = (w / 1.5) / rz;
            return {
                x: w / 2 + rx * f,
                y: h / 2 + dy * f,
                s: f
            };
        }

        // --- 3Dボックス描画 ---
        function drawBox(x, y, z, bw, bh, bd, color) {
            const p = [
                project(x, y, z), project(x + bw, y, z), project(x + bw, y + bh, z), project(x, y + bh, z),
                project(x, y, z + bd), project(x + bw, y, z + bd), project(x + bw, y + bh, z + bd), project(x, y + bh, z + bd)
            ];
            if (p.some(v => v === null)) return;

            const face = (indices, shade) => {
                ctx.fillStyle = color;
                ctx.globalAlpha = shade;
                ctx.beginPath();
                indices.forEach((idx, i) => {
                    if (i === 0) ctx.moveTo(p[idx].x, p[idx].y);
                    else ctx.lineTo(p[idx].x, p[idx].y);
                });
                ctx.closePath();
                ctx.fill();
            };
            face([4, 5, 6, 7], 1.0); // 前
            face([0, 4, 7, 3], 0.7); // 左
            face([1, 5, 6, 2], 0.7); // 右
            face([0, 1, 5, 4], 0.5); // 上
        }

        function update() {
            if (!isLocked) return;

            // 重力
            if (keys['Space'] && player.onGround) {
                player.vy = 0.25;
                player.onGround = false;
            }
            if (!player.onGround) {
                player.y -= player.vy;
                player.vy -= 0.015;
                if (player.y >= 0) {
                    player.y = 0;
                    player.vy = 0;
                    player.onGround = true;
                }
            }

            // 移動
            const spd = keys['ShiftLeft'] ? 0.15 : 0.08;
            let moved = false;
            if (keys['KeyW']) {
                player.x += Math.sin(player.ry) * spd;
                player.z += Math.cos(player.ry) * spd;
                moved = true;
            }
            if (keys['KeyS']) {
                player.x -= Math.sin(player.ry) * spd;
                player.z -= Math.cos(player.ry) * spd;
                moved = true;
            }
            if (keys['KeyA']) {
                player.x += Math.cos(player.ry) * spd;
                player.z -= Math.sin(player.ry) * spd;
                moved = true;
            }
            if (keys['KeyD']) {
                player.x -= Math.cos(player.ry) * spd;
                player.z += Math.sin(player.ry) * spd;
                moved = true;
            }
            if (moved) player.walk += 0.2;
        }

        function mainLoop() {
            update();
            ctx.clearRect(0, 0, w, h);
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = "#87ceeb";
            ctx.fillRect(0, 0, w, h);

            // 地面 (マイクラ風ブロック)
            for (let i = 0; i < 20; i++) {
                for (let j = 0; j < 20; j++) {
                    drawBox(i, 0.5, j, 0.95, 0.5, 0.95, (i + j) % 2 === 0 ? "#2ecc71" : "#27ae60");
                }
            }

            // 3Dアバター (スティーブ風)
            const px = player.x,
                py = player.y,
                pz = player.z;
            const swing = Math.sin(player.walk) * 0.4;

            ctx.globalAlpha = 1.0;
            drawBox(px - 0.3, py - 1.8, pz - 0.15, 0.6, 0.9, 0.3, "#3498db"); // 胴体
            drawBox(px - 0.25, py - 2.4, pz - 0.25, 0.5, 0.5, 0.5, "#ffdbac"); // 頭
            drawBox(px - 0.28, py - 0.9 + swing, pz - 0.1, 0.25, 0.9, 0.25, "#111"); // 左足
            drawBox(px + 0.03, py - 0.9 - swing, pz - 0.1, 0.25, 0.9, 0.25, "#111"); // 右足
            drawBox(px - 0.55, py - 1.7 - swing, pz - 0.1, 0.25, 0.8, 0.25, "#ffdbac"); // 左腕
            drawBox(px + 0.3, py - 1.7 + swing, pz - 0.1, 0.25, 0.8, 0.25, "#ffdbac"); // 右腕

            requestAnimationFrame(mainLoop);
        }

        mainLoop(); // ループ自体は常に回しておく
    </script>
</body>

</html>
